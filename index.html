<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Food App - Statistiky</title>
</head>
<body>

<h2>🍱 Moje potraviny (Přehled) <button onclick="logout()">Logout</button></h2>

<hr />

<h3>
  📊 Statistika spotřeby –
  <button onclick="changeMonth(-1)">←</button>
  <span id="stats-month"></span>
  <button onclick="changeMonth(1)">→</button>
</h3>

<div class="stats-grid">
  <div class="stats-card">
    <div class="stats-label">Nakoupeno</div>
    <div class="stats-value" id="stat-purchased">—</div>
    <span id="stat-avg-purchased"></span>
  </div>

  <div class="stats-card">
    <div class="stats-label">Spotřebováno</div>
    <div class="stats-value" id="stat-consumed">—</div>
    <span id="stat-avg-consumed"></span>
  </div>

  <div class="stats-card">
    <div class="stats-label">Rozdíl</div>
    <div class="stats-value" id="stat-diff">—</div>
  </div>
</div>

<h4>Statistika dle kategorií</h4>
<div id="stats-categories"></div>

<hr />

<div class="form-card">
  <h3>➕ Přidat potravinu</h3>
  
  <div class="form-grid" style="display: grid; grid-template-columns: 2fr 2fr 1fr 1fr 2fr 2fr; gap: 10px; margin-bottom: 12px; width: 100%;">
    <input id="name" placeholder="Název potraviny" style="width: 100%; box-sizing: border-box;" />
    
    <select id="category" style="width: 100%; box-sizing: border-box;">
      <option value="" disabled selected>Vyber kategorii</option>
      <option value="Mléčné výrobky">Mléčné výrobky</option>
      <option value="Pečivo">Pečivo</option>
      <option value="Salámy">Salámy</option>
      <option value="Maso">Maso</option>
      <option value="Luštěniny">Luštěniny</option>
      <option value="Ovoce / zelenina">Ovoce / zelenina</option>
      <option value="Nanuky">Nanuky</option>
      <option value="Sladkosti">Sladkosti</option>
      <option value="Nápoje">Nápoje</option>
      <option value="Dochucovadla">Dochucovadla</option>
      <option value="Trvanlivé potraviny">Trvanlivé potraviny</option>
    </select>
    
    <input id="qty" type="number" placeholder="Množství" min="0" style="width: 100%; box-sizing: border-box; text-align: center; padding-inline: 4px;" />
    
    <select id="unit" style="width: 100%; box-sizing: border-box; padding-inline: 4px;">
      <option value="ks" selected>ks</option>
      <option value="kg">kg</option>
      <option value="l">l</option>
    </select>
    
    <input id="price" type="number" placeholder="Cena za jednotku" min="0" style="width: 100%; box-sizing: border-box;" />
    <input id="expiry" type="date" style="width: 100%; box-sizing: border-box;" />
  </div>
  
  <div style="display: grid; grid-template-columns: 2fr 7fr 2fr; gap: 10px; align-items: center; margin-top: 5px; width: 100%;">
    <input type="file" id="barcode-photo-input" accept="image/*" style="display: none;">
    
    <button type="button" id="barcode-upload-btn" style="width: 100%; padding: 12px 5px; font-size: 14px; background: rgba(79, 124, 255, 0.15); border: 1px solid rgba(79, 124, 255, 0.4); color: var(--text); border-radius: 12px; cursor: pointer; white-space: nowrap; font-weight: 600; box-sizing: border-box; text-align: center;">
      📷 Nahrát fotku
    </button>
    
    <button onclick="addItem()" style="width: 100%; padding: 12px 5px; border-radius: 12px; background: linear-gradient(90deg, #4f7cff, #3b5bdb); border: none; color: white; font-weight: 600; cursor: pointer; white-space: nowrap; box-sizing: border-box; text-align: center;">
      Přidat do skladu
    </button>

    <a href="list.html" style="width: 100%; padding: 12px 5px; font-size: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text); border-radius: 12px; text-decoration: none; font-weight: 600; white-space: nowrap; text-align: center; display: inline-block; box-sizing: border-box;">
      📋 Otevřít sklad
    </a>
  </div>
</div>

<div id="loading-status" style="display: none; color: var(--accent); font-weight: 600; margin-top: 8px; font-size: 12px; letter-spacing: 0.05em; text-align: left;">
  🔎 Hledám čárový kód a produkt...
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="foceni.js"></script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js"

const supabase = createClient(
  "https://xexjuqswanxhjpjbldxj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhleGp1cXN3YW54aGpwamJsZHhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzIzODgsImV4cCI6MjA5Njg0ODM4OH0.CoVQPwKTfbkCkxJmLOzCZkvitmEAvh2o6dFOLomWl8w"
)

// OCHRANA STRÁNKY
const session = JSON.parse(localStorage.getItem("session"))
if (!session) window.location.href = "login.html"
await supabase.auth.setSession(session)

let currentMonthOffset = 0

function getMonthRange(offset = 0) {
  const now = new Date()
  const date = new Date(now.getFullYear(), now.getMonth() + offset, 1)
  const from = new Date(date.getFullYear(), date.getMonth(), 1)
  const to = new Date(date.getFullYear(), date.getMonth() + 1, 1)
  return { from, to, date }
}

window.changeMonth = function (dir) {
  currentMonthOffset += dir
  loadStats()
}

// === UPRAVENO: Zápis do food_inventory i purchase_log zároveň ===
// === KOMPLETNÍ FUNKČNÍ REPRODUKCE SOUČASNÉHO + PŮVODNÍHO KÓDU ===
window.addItem = async function () {
  const user = await supabase.auth.getUser()

  const name = document.getElementById("name").value
  const category = document.getElementById("category").value
  const qty = Number(document.getElementById("qty").value)
  const unit = document.getElementById("unit").value
  const price = Number(document.getElementById("price").value)
  const expiry = document.getElementById("expiry").value

  // 1. Zápis do skladu
  const { error: inventoryError } = await supabase
    .from("food_inventory")
    .insert({
      user_id: user.data.user.id,
      product_name: name,
      product_category: category,
      quantity: qty,
      unit,
      unit_price: price,
      expiry_date: expiry
    })

  if (inventoryError) {
    console.log("INVENTORY ERROR:", inventoryError)
    return
  }

  // 2. Nákupní log (opraveno podle původního funkčního vzoru)
  const { error: purchaseError } = await supabase
    .from("purchase_log")
    .insert({
      user_id: user.data.user.id,
      product_name: name,
      product_category: category,
      quantity: qty,              // Vráceno zpět
      unit_price: price,          // Vráceno zpět
      total_value: qty * price
    })

  if (purchaseError) {
    console.log("PURCHASE LOG ERROR:", purchaseError)
  }

  // 3. Vyčištění formuláře
  document.getElementById("name").value = ""
  document.getElementById("category").value = ""
  document.getElementById("qty").value = ""
  document.getElementById("unit").value = "" // Reset na prázdnou hodnotu dle tvého originálu
  document.getElementById("price").value = ""
  document.getElementById("expiry").value = ""

  // Reset zelených rámečků po vyfocení
  const nameEl = document.getElementById("name")
  const catEl = document.getElementById("category")
  if (nameEl) nameEl.classList.remove('auto-filled')
  if (catEl) catEl.classList.remove('auto-filled')

  // Spuštění loadů (pokud na této stránce nemáš loadItems, nevadí, loadStats zafunguje)
  if (typeof loadItems === "function") loadItems()
  loadStats()
}

async function loadStats() {
  const user = await supabase.auth.getUser()
  const { from, to, date } = getMonthRange(currentMonthOffset)

  document.getElementById("stats-month").textContent =
    date.toLocaleDateString("cs-CZ", { month: "long", year: "numeric" })

  const { data: consumption } = await supabase
    .from('consumption_log')
    .select('*')
    .eq('user_id', user.data.user.id)
    .gte('consumed_at', from.toISOString())
    .lt('consumed_at', to.toISOString())

  const { data: purchases } = await supabase
    .from('purchase_log')
    .select('*')
    .eq('user_id', user.data.user.id)
    .gte('purchased_at', from.toISOString())
    .lt('purchased_at', to.toISOString())

  const safeC = consumption || []
  const safeP = purchases || []

  const totalConsumed = safeC.reduce((s, r) => s + (r.total_value || 0), 0)
  const totalPurchased = safeP.reduce((s, r) => s + (r.total_value || 0), 0)
  const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate()

  document.getElementById('stat-consumed').textContent = totalConsumed.toFixed(2) + ' Kč'
  document.getElementById('stat-purchased').textContent = totalPurchased.toFixed(2) + ' Kč'
  document.getElementById('stat-diff').textContent = (totalPurchased - totalConsumed).toFixed(2) + ' Kč'
  document.getElementById('stat-avg-consumed').textContent = '(' + (totalConsumed / daysInMonth).toFixed(2) + ' Kč/den)'
  document.getElementById('stat-avg-purchased').textContent = '(' + (totalPurchased / daysInMonth).toFixed(2) + ' Kč/den)'

  const cats = {}
  safeP.forEach(r => {
    const cat = r.product_category || 'Bez kategorie'
    if (!cats[cat]) cats[cat] = { purchased: 0, consumed: 0 }
    cats[cat].purchased += r.total_value || 0
  })
  safeC.forEach(r => {
    const cat = r.product_category || 'Bez kategorie'
    if (!cats[cat]) cats[cat] = { purchased: 0, consumed: 0 }
    cats[cat].consumed += r.total_value || 0
  })

  const sorted = Object.entries(cats).sort((a, b) => b[1].consumed - a[1].consumed)
  const container = document.getElementById('stats-categories')

  container.innerHTML = `<div class="cat-header"><div>Kategorie</div><div>Nakoupeno</div><div>Spotřebováno</div><div>Podíl spotřeby</div></div>` + 
  sorted.map(([cat, d]) => {
    const pct = totalConsumed > 0 ? Math.round((d.consumed / totalConsumed) * 100) : 0
    return `
      <div class="cat-row">
        <div class="cat-name">${cat}</div>
        <div class="cat-purchased">${d.purchased.toFixed(2)} Kč</div>
        <div class="cat-consumed">${d.consumed.toFixed(2)} Kč</div>
        <div class="cat-progress-wrap">
          <div class="progress">
            <div class="progress-bar" style="width:${pct}%"></div>
            <div style="position:absolute; right:6px; top:50%; transform:translateY(-50%); font-size:12px; color:white; font-weight:600; mix-blend-mode: difference;">${pct} %</div>
          </div>
        </div>
      </div>`
  }).join('')
}

loadStats()

window.logout = async function () {
  await supabase.auth.signOut()
  localStorage.removeItem("session")
  window.location.href = "login.html"
}
</script>

</body>
</html>
